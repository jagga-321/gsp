<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="100%">
  <!-- Pipe/wrench icon on left -->
  <g transform="translate(60, 70)">
    <!-- Pipe body -->
    <rect x="20" y="60" width="140" height="80" fill="#0066B3" rx="6"/>
    <!-- Pipe ends (slightly darker) -->
    <rect x="10" y="55" width="20" height="90" fill="#004080" rx="3"/>
    <rect x="150" y="55" width="20" height="90" fill="#004080" rx="3"/>
    <!-- Water drop -->
    <path d="M 90 20 Q 70 50 70 60 Q 70 75 90 75 Q 110 75 110 60 Q 110 50 90 20 Z" fill="#1E88E5"/>
  </g>
  <!-- Wordmark -->
  <text x="240" y="120" font-family="Archivo Black, Helvetica, sans-serif" font-size="80" font-weight="900" fill="#F0EDE8" letter-spacing="-1">GREAT SOUTHERN</text>
  <text x="240" y="220" font-family="Archivo Black, Helvetica, sans-serif" font-size="80" font-weight="900" fill="#0066B3" letter-spacing="-1">PLUMBING (SA)</text>
</svg>
